[paths]
songs_dir = "songs"

[gpio]
left_contact_pin = 17
right_contact_pin = 27
debounce_ms = 30
p1_input = "jumppad"
p2_input = "jumppad"

[gpio.jumppad]
min_air_ms = 200
retrigger_ms = 400

[led]
muted_rgb_count = 4   # n: leading physical RGB LEDs (always off)
rgbw_count = 70     # m: active RGBW gameplay LEDs
pin = 10               # SPI MOSI (physical pin 19); use with 3.5mm audio
freq_hz = 800000
dma = 10
invert = false
brightness = 255
channel = 0
hit_flash_ms = 500
marker_span = 2           # static target / racket width
running_light_span = 1    # bright head width
running_light_tail = 4    # fading pixels behind the head
hit_marker_fraction = 0.10
running_light_spawn = "center"  # "center" = spawn mid-strip, travel to side marker; or tg-game --separated-lights
rgbw_byte_order = "WRGB"

[gameplay]
lead_time_beats = 8
duration_s = 60        # rhythm jump match length before the song stops
score_perfect = 3      # points awarded for a perfect hit
score_good = 1         # points awarded for a good hit
score_step_ms = 200    # delay between LEDs during the end-of-song score reveal
applause_flash_count = 10  # winner-color flashes after the score reveal
applause_flash_ms = 150    # duration of each on/off phase during applause
empty_shutdown_s = 5   # both pads empty this long ends an active game

[arcade]
start_hold_ms = 500    # continuous pad contact required to launch a game from idle
demo_idle_s = 600      # idle seconds before attract-mode demo Pong starts (0 = disabled)
demo_volume = 0.30     # SFX volume during attract-mode demo (0..1)
demo_miss_chance = 0.15  # NPC chance to miss a return during attract-mode demo

[gameplay.judgement_windows_ms]
perfect = 200
good = 500

[gameplay.health]
start = 20
max = 20
lose_on_error = 2
gain_on_good = 1
gain_on_perfect = 2

[gameplay.sfx]
# Optional WAV/OGG paths (relative to this file). Missing files are ignored.
chime = "chime.mp3"    # plays for each LED lit during the score reveal
perfect = "perfect_rythm.mp3"  # plays on a perfect hit during gameplay

[runtime]
update_hz = 60

[pong]
base_travel_ms = 2000        # marker-to-marker time at base speed
continuous_multiplier = 1.03 # speed-up applied on each hit within a rally
perfect_multiplier = 1.3     # extra speed for the next traversal after a perfect
serve_delay_ms = 700         # pause after a miss before the next serve
lives = 3                    # lives per player; 0 -> game over
first_server = 1             # player who serves first (1 or 2)
auto_perfect_chance = 0.10   # solo/demo auto player's chance of a perfect return
perfect_distance_leds = 1    # LED distance ball<->marker for a perfect hit
good_distance_leds = 4       # LED distance ball<->marker for a good hit
point_flash_count = 5        # half-strip flashes in winner color after each point
point_flash_intensity = 0.15 # brightness of the point flash (0..1)
gameover_flash_count = 10    # full-strip flashes in match-winner color at game over
flash_ms = 150               # duration of each on/off phase of a flash
score_step_ms = 750          # delay between segment steps during end-of-match score reveal

[pong.sfx]
# Optional WAV/OGG paths (relative to this file). Missing files are ignored.
hit = "pong.mp3"
perfect = "perfect_pong.mp3"
miss = "pong miss.mp3"
applause = "applause.mp3"  # plays once when a Pong match ends
pitch_randomize = 0.10  # randomize pitch by up to ±5% on each play (0 = off)
