[paths]
songs_dir = "songs"

[gpio]
left_contact_pin = 17
right_contact_pin = 27
debounce_ms = 30

[led]
muted_rgb_count = 60   # n: leading physical RGB LEDs (always off)
rgbw_count = 30        # m: active RGBW gameplay LEDs
pin = 10               # SPI MOSI (physical pin 19); use with 3.5mm audio
freq_hz = 800000
dma = 10
invert = false
brightness = 255
channel = 0
hit_flash_ms = 500
running_light_span = 2
hit_marker_fraction = 0.10
rgbw_byte_order = "WRGB"

[gameplay]
lead_time_beats = 8

[gameplay.judgement_windows_ms]
perfect = 100
good = 300

[gameplay.health]
start = 20
max = 20
lose_on_error = 2
gain_on_good = 1
gain_on_perfect = 2

[runtime]
update_hz = 60
